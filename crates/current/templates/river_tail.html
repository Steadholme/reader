  <!-- Toast host: transient write feedback (success/fail). Progressive enhancement only. -->
  <div class="toast-host" data-toast-host aria-live="polite" aria-atomic="true"></div>

  <!-- Keyboard shortcuts help overlay. Hidden by default; with no JS it never appears, and the
       list above still works entirely without scripting. -->
  <div id="kbd-help" class="kbd-help" hidden>
    <div class="kbd-help__card" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
      <div class="kbd-help__head">
        <h2>Keyboard shortcuts</h2>
        <button class="btn btn-ghost btn-sm" type="button" data-kbd-close aria-label="Close">Close</button>
      </div>
      <table class="data">
        <tbody>
          <tr><td><kbd>j</kbd></td><td>Next entry</td></tr>
          <tr><td><kbd>k</kbd></td><td>Previous entry</td></tr>
          <tr><td><kbd>o</kbd></td><td>Open entry</td></tr>
          <tr><td><kbd>m</kbd></td><td>Mark entry read</td></tr>
          <tr><td><kbd>r</kbd></td><td>Refresh</td></tr>
          <tr><td><kbd>?</kbd></td><td>Toggle this help</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
  (function () {
    var river = document.querySelector('[data-river]');
    var filter = river ? (river.getAttribute('data-filter') || 'unread') : 'unread';
    var pill = document.querySelector('[data-count-pill]');
    var host = document.querySelector('[data-toast-host]');
    var help = document.getElementById('kbd-help');
    var entries = Array.prototype.slice.call(document.querySelectorAll('[data-entry]'));
    var cur = -1;

    // ---- CSRF (double-submit): read the JS-readable __Host-csrf cookie ----
    function cookie(name) {
      var parts = document.cookie ? document.cookie.split('; ') : [];
      for (var i = 0; i < parts.length; i++) {
        var eq = parts[i].indexOf('=');
        if (eq > -1 && parts[i].slice(0, eq) === name) return decodeURIComponent(parts[i].slice(eq + 1));
      }
      return '';
    }
    var CSRF = cookie('__Host-csrf');

    // ---- toast: transient success/fail feedback ----
    function toast(msg, ok) {
      if (!host) return;
      var t = document.createElement('div');
      t.className = 'toast ' + (ok ? 'toast--ok' : 'toast--err');
      t.setAttribute('role', 'status');
      t.textContent = msg; // remote/dynamic text via textContent — never innerHTML
      host.appendChild(t);
      setTimeout(function () {
        t.classList.add('is-leaving');
        setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 200);
      }, 2400);
    }

    function post(url, params) {
      var body = Object.keys(params).map(function (k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      }).join('&');
      return fetch(url, {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
        body: body
      }).then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      });
    }

    function idFromAction(action) {
      var m = action.match(/\/i\/([^\/]+)\/[a-z-]+$/);
      return m ? decodeURIComponent(m[1]) : '';
    }

    function setCount(n) {
      if (!pill || typeof n !== 'number') return;
      var noun = pill.getAttribute('data-noun') || 'unread';
      var lim = parseInt(pill.getAttribute('data-limit'), 10) || 0;
      pill.textContent = (lim && n >= lim) ? (lim + '+ ' + noun) : (n + ' ' + noun);
    }
    function bumpCount(delta) {
      if (!pill) return;
      var m = pill.textContent.match(/\d+/);
      if (!m) return;
      var n = Math.max(0, parseInt(m[0], 10) + delta);
      setCount(n);
    }

    function refresh() { entries = Array.prototype.slice.call(document.querySelectorAll('[data-entry]')); }

    function maybeEmpty() {
      if (!river || river.querySelector('[data-entry]')) return;
      var d = document.createElement('div'); d.className = 'empty';
      var ico = document.createElement('div'); ico.className = 'empty__ico'; ico.setAttribute('aria-hidden', 'true'); ico.textContent = '✓';
      var t = document.createElement('p'); t.className = 'empty__title'; t.textContent = "You're all caught up.";
      var s = document.createElement('p'); s.className = 'empty__sub'; s.textContent = 'New items appear here as your feeds update.';
      d.appendChild(ico); d.appendChild(t); d.appendChild(s); river.appendChild(d);
    }

    function removeEntry(entry) {
      entry.classList.add('is-removing');
      setTimeout(function () {
        if (entry.parentNode) entry.parentNode.removeChild(entry);
        refresh();
        if (cur >= entries.length) cur = entries.length - 1;
        maybeEmpty();
      }, 160);
    }

    // ---- optimistic: mark one read ----
    function doMarkRead(form) {
      var id = idFromAction(form.getAttribute('action'));
      if (!id) { form.submit(); return; }
      var btn = form.querySelector('button');
      if (btn) { btn.setAttribute('aria-busy', 'true'); btn.textContent = 'Marking…'; }
      var entry = form.closest('[data-entry]');
      post('/api/i/' + encodeURIComponent(id) + '/read', { csrf_token: CSRF })
        .then(function (data) {
          toast('Marked read', true);
          if (typeof data.unread === 'number') setCount(data.unread);
          if (filter === 'unread' && entry) { removeEntry(entry); }
          else if (btn) { btn.removeAttribute('aria-busy'); btn.textContent = 'Mark read'; }
        })
        .catch(function () {
          toast('Could not mark read — try again', false);
          if (btn) { btn.removeAttribute('aria-busy'); btn.textContent = 'Mark read'; }
        });
    }

    // ---- optimistic: toggle star ----
    function doStar(form) {
      var id = idFromAction(form.getAttribute('action'));
      if (!id) { form.submit(); return; }
      var btn = form.querySelector('button');
      var entry = form.closest('[data-entry]');
      if (btn) btn.setAttribute('aria-busy', 'true');
      post('/api/i/' + encodeURIComponent(id) + '/star', { csrf_token: CSRF, filter: filter })
        .then(function (data) {
          var on = !!data.starred;
          if (btn) { btn.removeAttribute('aria-busy'); btn.textContent = on ? '★ Unstar' : '☆ Star'; }
          // keep the "Saved" head pill in sync
          if (entry) {
            var head = entry.querySelector('.entry__head');
            var existing = entry.querySelector('.entry__head .pill-accent');
            if (on && !existing && head) {
              var badge = head.querySelector('.feed-badge');
              var pillEl = document.createElement('span'); pillEl.className = 'pill pill-accent'; pillEl.textContent = 'Saved';
              if (badge && badge.nextSibling) head.insertBefore(pillEl, badge.nextSibling); else head.appendChild(pillEl);
            } else if (!on && existing) { existing.parentNode.removeChild(existing); }
          }
          toast(on ? 'Saved' : 'Removed from saved', true);
        })
        .catch(function () {
          if (btn) btn.removeAttribute('aria-busy');
          toast('Could not update — try again', false);
        });
    }

    // ---- optimistic: mark all read ----
    function doMarkAll(form) {
      var btn = form.querySelector('button');
      if (btn) { btn.setAttribute('aria-busy', 'true'); btn.textContent = 'Marking…'; }
      post('/api/read-all', { csrf_token: CSRF })
        .then(function (data) {
          toast('All marked read', true);
          setCount(typeof data.unread === 'number' ? data.unread : 0);
          if (filter === 'unread') {
            entries.forEach(function (e) { if (e.parentNode) e.parentNode.removeChild(e); });
            refresh(); cur = -1; maybeEmpty();
          }
          if (btn) { btn.removeAttribute('aria-busy'); btn.textContent = 'Mark all read'; }
        })
        .catch(function () {
          toast('Could not mark all read — try again', false);
          if (btn) { btn.removeAttribute('aria-busy'); btn.textContent = 'Mark all read'; }
        });
    }

    // Intercept form submits (delegated) so no-JS still POSTs the original form.
    document.addEventListener('submit', function (e) {
      var form = e.target;
      if (!(form instanceof HTMLFormElement) || !CSRF) return;
      var action = form.getAttribute('action') || '';
      if (form.hasAttribute('data-mark-read')) { e.preventDefault(); doMarkRead(form); }
      else if (/\/i\/[^\/]+\/star$/.test(action)) { e.preventDefault(); doStar(form); }
      else if (action === '/read-all') { e.preventDefault(); doMarkAll(form); }
    });

    // ---- keyboard river (j/k/o/m) + help overlay ----
    function select(i) {
      if (i < 0 || i >= entries.length) return;
      if (cur >= 0 && entries[cur]) entries[cur].classList.remove('is-current');
      cur = i;
      var el = entries[cur];
      el.classList.add('is-current');
      el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      el.focus({ preventScroll: true });
    }
    function toggleHelp(force) {
      if (!help) return;
      var show = typeof force === 'boolean' ? force : help.hasAttribute('hidden');
      if (show) { help.removeAttribute('hidden'); } else { help.setAttribute('hidden', ''); }
    }

    var toggleBtn = document.querySelector('[data-kbd-toggle]');
    if (toggleBtn) toggleBtn.addEventListener('click', function () { toggleHelp(); });
    var closeBtn = document.querySelector('[data-kbd-close]');
    if (closeBtn) closeBtn.addEventListener('click', function () { toggleHelp(false); });

    document.addEventListener('keydown', function (e) {
      var t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      switch (e.key) {
        case 'j': e.preventDefault(); select(cur < 0 ? 0 : Math.min(cur + 1, entries.length - 1)); break;
        case 'k': e.preventDefault(); if (cur > 0) select(cur - 1); break;
        case 'o': {
          e.preventDefault();
          if (cur < 0) break;
          var link = entries[cur].querySelector('[data-open]');
          if (link) window.location.assign(link.getAttribute('href'));
          break;
        }
        case 'm': {
          e.preventDefault();
          if (cur < 0) break;
          var mform = entries[cur].querySelector('[data-mark-read]');
          // Route through the optimistic path (requestSubmit fires the submit event; submit() would not).
          if (mform) { if (mform.requestSubmit) mform.requestSubmit(); else doMarkRead(mform); }
          break;
        }
        case 'r': e.preventDefault(); window.location.reload(); break;
        case '?': e.preventDefault(); toggleHelp(); break;
        case 'Escape': toggleHelp(false); break;
      }
    });
  })();
  </script>
