<div class="cur-pagehead">
  <div>
    <h1 class="cur-pagehead__title">Your river</h1>
    <p class="sub">Newest items across all your feeds</p>
  </div>
  <div class="cur-pagehead__actions">
    <button class="btn btn-ghost btn-sm" type="button" data-kbd-toggle aria-label="Keyboard shortcuts">? Shortcuts</button>
    <form method="post" action="/read-all">
      <input type="hidden" name="csrf_token" value="{{CSRF}}">
      <button class="btn btn-secondary btn-sm" type="submit">Mark all read</button>
    </form>
  </div>
</div>

<section class="river" data-river data-filter="{{FILTER}}">
  {{ENTRIES}}
</section>
