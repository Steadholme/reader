<div class="cur-progressbar" aria-hidden="true"></div>

<div class="cur-readbar">
  <a class="btn btn-ghost btn-sm" href="/">&larr; Back to river</a>
  <div class="cur-readbar__actions">
    {{STAR}}
    {{SOURCELINK}}
  </div>
</div>

<div class="cur-readshell">
  <article class="cur-read">
    <div class="cur-read__head">
      <span class="cur-tile cur-tile--sm cur-tile--t{{TINT}}" aria-hidden="true">{{TILE}}</span>
      <span class="cur-read__feed">{{FEED}}</span>
      {{WHEN}}
      {{READTIME}}
      <span class="cur-provchip{{SOURCE_CLS}}">{{SOURCE}}</span>
    </div>
    <h1 class="cur-read__title">{{TITLE}}</h1>
    {{DOMAINROW}}
    <hr class="cur-read__rule">
    <div class="cur-prose">
      {{CONTENT}}
    </div>
    <footer class="cur-read__foot">
      {{FOOTLINK}}
      <a class="btn btn-ghost btn-sm" href="/">Back to river</a>
    </footer>
  </article>
</div>
