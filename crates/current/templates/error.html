<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{STATUS}} · Current · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="appbar">
    <a class="appbar__brand" href="/" aria-label="HOLDFAST Feeds">
      <span class="app-tile" style="--app:#ea580c;--app-soft:#fff3ec" aria-hidden="true">{{SHIELD}}</span>
      <span class="appbar__name"><b>Feeds</b><span>rss.w33d.xyz</span></span>
    </a>
    {{USERBOX}}
  </header>

  <main class="console">
    <section class="card card--message">
      <div class="card__body">
        <div class="status-code">{{STATUS}}</div>
        <h1 class="message-heading">{{HEADING}}</h1>
        <p class="message-body">{{MESSAGE}}</p>
        <a class="btn btn-primary" href="/">Back to your river</a>
      </div>
    </section>
  </main>
</body>
</html>
