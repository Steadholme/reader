<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Crier · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-reading">
{{TOPBAR}}
<main class="crier-shell">
  <div class="crier-main">
{{FEEDTABS}}
    <section class="card crier-hero">
      {{HEADER}}
      <div class="crier-hero__row">
        {{AVATAR}}
        <div class="crier-hero__actions">
          <details class="profile__edit crier-hero__edit">
            <summary class="btn btn-ghost btn-sm">Edit profile</summary>
            <div class="crier-hero__editpop">
              <form method="post" action="/api/profile">
                <input type="hidden" name="csrf_token" value="{{CSRF}}">
                <div class="field">
                  <label for="avatar_url">Avatar image URL (icon)</label>
                  <input id="avatar_url" name="avatar_url" class="input" type="url" placeholder="https://aperture.w33d.xyz/s/…" value="{{AVATAR_URL}}">
                </div>
                <div class="field">
                  <label for="header_url">Header image URL (banner)</label>
                  <input id="header_url" name="header_url" class="input" type="url" placeholder="https://aperture.w33d.xyz/s/…" value="{{HEADER_URL}}">
                </div>
                <div class="composer__actions">
                  <button class="btn btn-primary" type="submit">Save profile</button>
                </div>
              </form>
            </div>
          </details>
        </div>
      </div>
      <div class="crier-hero__id">
        <h1 class="crier-hero__name">{{DISPLAY_NAME}}</h1>
        <div class="crier-hero__handle">@{{HANDLE}}</div>
        <p class="crier-hero__bio">{{SUMMARY}}</p>
        <div class="crier-hero__stats">
          <span><strong>{{NOTE_COUNT}}</strong> posts</span>
          <span><strong>{{FOLLOWERS}}</strong> followers</span>
        </div>
      </div>
    </section>

    <section class="card crier-compose">
      <div class="card__body">
        {{COMPOSE_AVATAR}}
        <form class="crier-compose__form" method="post" action="/api/notes">
          <input type="hidden" name="csrf_token" value="{{CSRF}}">
          <div class="crier-compose__field">
            <label class="sr-only" for="content">New post</label>
            <textarea id="content" name="content" class="crier-compose__text" maxlength="5000" placeholder="What's happening?" required></textarea>
          </div>
          <div class="crier-compose__foot">
            <details class="crier-compose__attach">
              <summary class="btn btn-subtle btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg> Image</summary>
              <div class="crier-compose__attachrow">
                <label class="sr-only" for="attachment_url">Attach an image (Aperture share URL)</label>
                <input id="attachment_url" name="attachment_url" class="input" type="url" placeholder="https://aperture.w33d.xyz/s/…">
              </div>
            </details>
            <button class="btn btn-primary crier-compose__submit" type="submit">Publish</button>
          </div>
        </form>
      </div>
    </section>

    <div class="note-list">
      {{ITEMS}}
    </div>
  </div>
  <aside class="crier-rail">
    <div class="crier-rail__inner">
      {{FOLLOW}}
      {{TAGS}}
    </div>
  </aside>
</main>
</body>
</html>
