<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Crier · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-reading">
{{TOPBAR}}
<main class="reader">
  <div class="profile">
    {{HEADER}}
    {{AVATAR}}
    <h1 class="profile__name">{{DISPLAY_NAME}}</h1>
    <div class="profile__handle">@{{HANDLE}}</div>
    <p class="profile__summary">{{SUMMARY}}</p>
    <div class="profile__stats">
      <span><strong>{{NOTE_COUNT}}</strong> posts</span>
      <span><strong>{{FOLLOWERS}}</strong> followers</span>
    </div>
  </div>

  <section class="card composer">
    <div class="card__body">
      <form method="post" action="/api/notes">
        <input type="hidden" name="csrf_token" value="{{CSRF}}">
        <div class="field">
          <label for="content">New post</label>
          <textarea id="content" name="content" class="composer__body" maxlength="5000" placeholder="What's happening?" required></textarea>
        </div>
        <div class="field">
          <label for="attachment_url">Attach an image (Aperture share URL, optional)</label>
          <input id="attachment_url" name="attachment_url" class="composer__url" type="url" placeholder="https://aperture.w33d.xyz/s/…">
        </div>
        <div class="composer__actions">
          <button class="btn btn-primary" type="submit">Publish</button>
        </div>
      </form>
    </div>
  </section>

  <section class="card composer">
    <div class="card__body">
      <form method="post" action="/api/follow">
        <input type="hidden" name="csrf_token" value="{{CSRF}}">
        <div class="field">
          <label for="follow-target">Follow a remote actor</label>
          <input id="follow-target" name="target" class="composer__body" placeholder="https://mastodon.social/users/Gargron  ·  or  ·  Gargron@mastodon.social" required>
        </div>
        <div class="composer__actions">
          <a class="btn btn-ghost" href="/home">Home timeline &rarr;</a>
          <button class="btn btn-primary" type="submit">Follow</button>
        </div>
      </form>
    </div>
  </section>

  <section class="card composer">
    <div class="card__body">
      <details class="profile__edit">
        <summary class="btn btn-ghost btn-sm">Edit profile images</summary>
        <form method="post" action="/api/profile">
          <input type="hidden" name="csrf_token" value="{{CSRF}}">
          <div class="field">
            <label for="avatar_url">Avatar image URL (icon)</label>
            <input id="avatar_url" name="avatar_url" class="composer__url" type="url" placeholder="https://aperture.w33d.xyz/s/…" value="{{AVATAR_URL}}">
          </div>
          <div class="field">
            <label for="header_url">Header image URL (banner)</label>
            <input id="header_url" name="header_url" class="composer__url" type="url" placeholder="https://aperture.w33d.xyz/s/…" value="{{HEADER_URL}}">
          </div>
          <div class="composer__actions">
            <button class="btn btn-primary" type="submit">Save profile</button>
          </div>
        </form>
      </details>
    </div>
  </section>

  {{TAGS}}

  <div class="note-list">
    {{ITEMS}}
  </div>
</main>
</body>
</html>
