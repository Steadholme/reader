<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Sources · Magpie · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="appbar">
    <a class="appbar__brand" href="/" aria-label="HOLDFAST Clips">
      <span class="app-tile" style="--app:#db2777;--app-soft:#fdf0f6" aria-hidden="true">{{SHIELD}}</span>
      <span class="appbar__name"><b>Clips</b><span>clip.w33d.xyz</span></span>
    </a>
    {{USERBOX}}
  </header>

  <main class="console">
    <div class="console__head console__head--row">
      <div>
        <h1>Sources</h1>
        <p class="sub">Saved clips grouped by their source site.</p>
      </div>
      <a class="btn btn-ghost btn-sm" href="/">&larr; Reading list</a>
    </div>

    <section class="card">
      <div class="card__head"><h2>All sources</h2></div>
      <div class="card__body">
        {{BODY}}
      </div>
    </section>
  </main>
</body>
</html>
