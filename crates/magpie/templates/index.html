<div class="console__head mg-pagehead">
  <span class="mg-pagehead__glyph" aria-hidden="true">{{ICON_BOOKMARK}}</span>
  <div>
    <h1 class="mg-pagehead__title">Read later</h1>
    <p class="sub mg-pagehead__sub">Clip web pages to read later. Magpie fetches each page, pulls out the readable text, and saves it to your list.</p>
  </div>
</div>

<section class="reading">
  <form class="search-bar mg-search" method="get" action="/search" role="search">
    <label class="mg-search__field">
      <span class="mg-search__ico" aria-hidden="true">{{ICON_SEARCH}}</span>
      <input class="search-input" type="search" name="q" inputmode="search" autocomplete="off"
             placeholder="Search your clips…" aria-label="Search your clips">
    </label>
    <button class="btn btn-primary btn-sm" type="submit">Search</button>
  </form>
  {{VIEWS}}
  {{TOOLBAR}}
  <ul class="clip-list">
    {{LIST}}
  </ul>
</section>
