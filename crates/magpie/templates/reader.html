<div class="mg-progressbar" aria-hidden="true"><span class="mg-progressbar__fill" id="readerBarFill"></span></div>
<div class="console__head console__head--row mg-readbar">
  <a class="btn btn-ghost btn-sm" href="/">&larr; Reading list</a>
  <div class="reader-actions mg-readbar__actions">
    <a class="btn btn-ghost btn-sm" href="/highlights">My highlights</a>
    <a class="btn btn-ghost btn-sm" href="{{URL_ATTR}}" target="_blank" rel="noopener noreferrer nofollow">Open original</a>
    {{FAVORITE}}
    {{ARCHIVE}}
    {{DELETE}}
  </div>
</div>

<div class="mg-readshell">
  <article class="mg-read">
    <h1 class="mg-read__title">{{TITLE}}</h1>
    <div class="mg-read__byline">{{META}}</div>
    <p class="reader-source"><a href="{{URL_ATTR}}" target="_blank" rel="noopener noreferrer nofollow">{{URL_TEXT}}</a></p>
    <hr class="mg-read__rule">
    {{TAGS}}
    <div class="reader-body mg-prose">
      {{CONTENT}}
    </div>
  </article>
  {{HIGHLIGHTS}}
</div>
{{PROGRESS}}
