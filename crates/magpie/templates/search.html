<div class="console__head mg-pagehead">
  <span class="mg-pagehead__glyph" aria-hidden="true">{{ICON_SEARCH}}</span>
  <div>
    <h1 class="mg-pagehead__title">Search</h1>
    <p class="sub mg-pagehead__sub">Find saved clips by title or readable text.</p>
  </div>
</div>

<section class="reading">
  <form class="search-bar mg-search" method="get" action="/search" role="search">
    <label class="mg-search__field">
      <span class="mg-search__ico" aria-hidden="true">{{ICON_SEARCH}}</span>
      <input class="search-input" type="search" name="q" value="{{QUERY_ATTR}}" inputmode="search"
             autocomplete="off" placeholder="Search your clips…" aria-label="Search your clips" autofocus>
    </label>
    <button class="btn btn-primary btn-sm" type="submit">Search</button>
  </form>
  {{RESULTMETA}}
  <ul class="clip-list">
    {{LIST}}
  </ul>
  {{MORE}}
</section>
