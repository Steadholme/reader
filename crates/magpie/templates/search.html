<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Search · Magpie · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/" aria-label="HOLDFAST Magpie">
        <span class="brand__glyph" aria-hidden="true">{{SHIELD}}</span>
        <span class="brand__word">HOLDFAST</span>
      </a>
      <div class="topbar__right">{{USERBOX}}</div>
    </div>
  </header>

  <main class="console">
    <div class="console__head console__head--row">
      <a class="btn btn-ghost btn-sm" href="/">&larr; Reading list</a>
      <h1>Search</h1>
    </div>

    <section class="reading">
      <form class="search-bar" method="get" action="/search" role="search">
        <input class="search-input" type="search" name="q" value="{{QUERY_ATTR}}" inputmode="search"
               autocomplete="off" placeholder="Search your clips…" aria-label="Search your clips" autofocus>
        <button class="btn btn-secondary btn-sm" type="submit">Search</button>
      </form>
      <ul class="clip-list">
        {{LIST}}
      </ul>
      {{MORE}}
    </section>
  </main>
</body>
</html>
