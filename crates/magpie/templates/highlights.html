<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Highlights · Magpie · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/" aria-label="HOLDFAST Magpie">
        <span class="brand__glyph" aria-hidden="true">{{SHIELD}}</span>
        <span class="brand__word">HOLDFAST</span>
      </a>
      <div class="topbar__right">{{USERBOX}}</div>
    </div>
  </header>

  <main class="console">
    <div class="console__head console__head--row">
      <div>
        <h1>My highlights</h1>
        <p class="sub">Every passage you have highlighted, grouped by the clip it came from.</p>
      </div>
      <a class="btn btn-ghost btn-sm" href="/">&larr; Reading list</a>
    </div>

    <div class="highlights-page">
      {{BODY}}
    </div>
  </main>
</body>
</html>
