<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Highlights · Magpie · HOLDFAST</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="appbar">
    <a class="appbar__brand" href="/" aria-label="HOLDFAST Clips">
      <span class="app-tile" style="--app:#db2777;--app-soft:#fdf0f6" aria-hidden="true">{{SHIELD}}</span>
      <span class="appbar__name"><b>Clips</b><span>clip.w33d.xyz</span></span>
    </a>
    {{USERBOX}}
  </header>

  <main class="console">
    <div class="console__head console__head--row">
      <div>
        <h1>My highlights</h1>
        <p class="sub">Every passage you have highlighted, grouped by the clip it came from.</p>
      </div>
      <a class="btn btn-ghost btn-sm" href="/">&larr; Reading list</a>
    </div>

    <div class="highlights-page">
      {{BODY}}
    </div>
  </main>
</body>
</html>
